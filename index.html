<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habsida Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="left">
            <img src="img/bg.jpg" alt="bg image">
        </div>
        <div class="right">
            <h1>Get iinto it today</h1>
            <p>There is no change or obligation upon registration.</p>
            <div class="register-buttons">
                <button> <img src="img/facebook.svg" alt="Facebook icon" width="10px"> Register with Facebook</button>
                <button> <img src="img/linkedin.svg" alt="LinkedIn icon" width="10px"> Register with LinkedIn</button>
            </div>
            <span>or</span>
            <div class="input-fields">
                <input type="email" placeholder="Email">
                <input type="tel" placeholder="Phone">
            </div>
            <div class = "investor-type">
                <h2>What type of investor are you?</h2>
                <p>Select the type of investor you are below.</p>
                <div class="investor-radio">
                    <label><input type="radio" name="investor-type"> Individual <span class="hint-icon">ⓘ</span></label>
                    <label><input type="radio" name="investor-type"> Business <span class="hint-icon">ⓘ</span></label>
                    <label><input type="radio" name="investor-type"> IRA <span class="hint-icon">ⓘ</span></label>
                    <label><input type="radio" name="investor-type"> Trust <span class="hint-icon">ⓘ</span></label>
                </div>
                <label><input type="checkbox" > I agree to the term and receiving notifications from iintoo <a href="#" >View full terms</a></label>
                <br>
                <button>Create account</button> 

            </div>
        </div>
        
    </div>
    

    
</body>
</html>
